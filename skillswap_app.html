
<h2 class="sr-only">SkillSwap — Platformă web de schimb de aptitudini între utilizatori</h2>

<style>
*{margin:0;padding:0;box-sizing:border-box}
#ss{height:700px;display:flex;flex-direction:column;border:0.5px solid var(--color-border-tertiary);border-radius:16px;overflow:hidden;font-family:var(--font-sans)}
#ss-nav{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:0 1.25rem;display:flex;align-items:center;gap:6px;height:52px;flex-shrink:0}
#ss-body{flex:1;overflow-y:auto;background:#F4F3ED}
.ss-logo{font-family:var(--font-serif);font-size:19px;color:#0B5540;font-weight:500;margin-right:auto;cursor:pointer;flex-shrink:0}
.nl{font-size:13px;color:var(--color-text-secondary);cursor:pointer;padding:5px 9px;border-radius:var(--border-radius-md);transition:all .12s}
.nl:hover{color:var(--color-text-primary);background:var(--color-background-secondary)}
.nl.act{color:#0B5540;font-weight:500}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.1rem 1.25rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans);cursor:pointer;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn-p{background:#0B5540;color:white;border-color:#0B5540}.btn-p:hover{background:#093F30}
.btn-a{background:#B8750F;color:white;border-color:#B8750F}.btn-a:hover{background:#9A6209}
.btn-d{color:#8B2525;border-color:#E09090}.btn-d:hover{background:#FCEBEB}
.inp{width:100%;padding:8px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary)}
.inp:focus{outline:none;border-color:#0B5540;box-shadow:0 0 0 2px rgba(11,85,64,.12)}
.bg{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500}
.bg-g{background:#E1F5EE;color:#074F3F}.bg-a{background:#FAEEDA;color:#5C3405}.bg-r{background:#FCEBEB;color:#4A1212}.bg-b{background:#E6F1FB;color:#052B51}.bg-y{background:#F1EFE8;color:#3A3A30}
.page{padding:1.25rem;max-width:780px;margin:0 auto}
.hero{background:#0B5540;padding:2.5rem 2rem;text-align:center;color:white}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;color:white;flex-shrink:0}
.alert-s{background:#E1F5EE;color:#074F3F;padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:10px}
.alert-e{background:#FCEBEB;color:#4A1212;padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:10px}
.tab-bar{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.25rem}
.tab{padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;color:var(--color-text-secondary);transition:all .12s;margin-bottom:-1px}
.tab.act{border-bottom-color:#0B5540;color:#0B5540;font-weight:500}
.row{display:flex;align-items:center;gap:10px}
.row-sb{display:flex;align-items:center;justify-content:space-between;gap:10px}
</style>

<div id="ss">
  <nav id="ss-nav"></nav>
  <div id="ss-body"></div>
</div>

<script>
const S={
  view:'home',user:null,focusUser:null,focusConv:null,
  editMode:false,proposeForm:false,searchQ:'',adminTab:'users',alert:null,
  users:[
    {id:1,un:'alex_dev',email:'alex@example.com',pw:'pass123',role:'member',confirmed:true,blocked:false,name:'Alexandru Popa',bio:'Pasionat de tehnologie și programare web.',offered:[{cat:'Programare',desc:'Python, React, Node.js — 5 ani experiență'}],wanted:[{cat:'Design Grafic'}],av:'AP',col:'#0B5540'},
    {id:2,un:'maria_design',email:'maria@example.com',pw:'pass123',role:'member',confirmed:true,blocked:false,name:'Maria Ionescu',bio:'Designer cu ochi pentru detalii și branding.',offered:[{cat:'Design Grafic',desc:'Figma, Adobe Suite, UI/UX, branding'}],wanted:[{cat:'Fotografie'}],av:'MI',col:'#B8750F'},
    {id:3,un:'tudor_foto',email:'tudor@example.com',pw:'pass123',role:'member',confirmed:true,blocked:false,name:'Tudor Constantin',bio:'Fotograf freelancer cu echipament profesional.',offered:[{cat:'Fotografie',desc:'Portret, produs, peisaj — calitate premium'}],wanted:[{cat:'Marketing Digital'}],av:'TC',col:'#4A3FAA'},
    {id:4,un:'ioana_mkt',email:'ioana@example.com',pw:'pass123',role:'member',confirmed:true,blocked:false,name:'Ioana Dumitrescu',bio:'Specialist marketing cu 3 ani experiență.',offered:[{cat:'Marketing Digital',desc:'SEO, Google Ads, social media, content'}],wanted:[{cat:'Programare'}],av:'ID',color:'#8C2E50',col:'#8C2E50'},
    {id:5,un:'dan_eng',email:'dan@example.com',pw:'pass123',role:'member',confirmed:true,blocked:false,name:'Dan Marinescu',bio:'Profesor de engleză certificat CELTA.',offered:[{cat:'Engleză',desc:'Conversație, gramatică, pregătire IELTS/TOEFL'}],wanted:[{cat:'Programare'}],av:'DM',col:'#0D6650'},
    {id:99,un:'admin',email:'admin@skillswap.ro',pw:'admin123',role:'admin',confirmed:true,blocked:false,name:'Administrator',bio:'',offered:[],wanted:[],av:'AD',col:'#2D2980'}
  ],
  reqs:[
    {id:1,fId:1,tId:2,msg:'Salut! Îți ofer ajutor cu programare web în schimbul unui logo pentru proiectul meu.',status:'Pending',dt:'2025-06-10'},
    {id:2,fId:3,tId:4,msg:'Bună! Pot face poze profesionale pentru portofoliu, aș vrea ajutor cu marketingul.',status:'Accepted',dt:'2025-06-08'}
  ],
  convs:[
    {id:1,pts:[1,2],msgs:[{f:1,t:'Salut Maria! Am văzut că oferi design grafic.',ts:'10:20'},{f:2,t:'Da, bună! Cu ce te pot ajuta?',ts:'10:22'},{f:1,t:'Aș vrea să facem un swap — programare contra logo.',ts:'10:25'}],rId:1},
    {id:2,pts:[3,4],msgs:[{f:3,t:'Bună Ioana! Pot face poze profesionale pentru campania ta.',ts:'09:10'},{f:4,t:'Super! Avem nevoie de poze pentru produse.',ts:'09:15'},{f:3,t:'Perfect, stabilim detaliile.',ts:'09:18'}],rId:2}
  ],
  sessions:[
    {id:1,cId:2,iId:3,gId:4,date:'2025-06-22',time:'14:00',loc:'https://meet.google.com/abc-xyz',status:'În așteptare'}
  ],
  reports:[{id:1,rerId:2,redId:3,reason:'Ofertă inadecvată în descriere',status:'Nou'}]
};

function uid(id){return S.users.find(u=>u.id===id)}
function convOf(uid1,uid2){return S.convs.find(c=>c.pts.includes(uid1)&&c.pts.includes(uid2))}
function partner(conv,uid){return uid(conv.pts.find(id=>id!==uid))}
function myConvs(){return S.convs.filter(c=>c.pts.includes(S.user.id))}
function pendingFor(uid){return S.reqs.filter(r=>r.tId===uid&&r.status==='Pending')}
function sessionOf(cId){return S.sessions.find(s=>s.cId===cId)}
function reqOf(id){return S.reqs.find(r=>r.id===id)}
function ts(){return new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}

function av(u,sz=40){
  return `<div class="av" style="width:${sz}px;height:${sz}px;background:${u.col||u.color||'#0B5540'};font-size:${Math.round(sz*.35)}px">${u.av}</div>`;
}

function go(view,extra={}){
  Object.assign(S,extra);
  S.view=view;
  render();
  document.getElementById('ss-body').scrollTop=0;
}

function render(){
  document.getElementById('ss-nav').innerHTML=navHTML();
  document.getElementById('ss-body').innerHTML=viewHTML();
}

function navHTML(){
  if(!S.user){
    return `<span class="ss-logo" onclick="go('home')">SkillSwap</span>
    <span class="nl ${S.view==='home'?'act':''}" onclick="go('home')">Acasă</span>
    <span class="nl" onclick="go('browse')">Aptitudini</span>
    <span class="nl ${S.view==='login'?'act':''}" onclick="go('login')" style="margin-left:auto">Autentificare</span>
    <button class="btn btn-p" onclick="go('register')" style="font-size:12px">Înregistrare</button>`;
  }
  const pend=pendingFor(S.user.id).length;
  const msgs=myConvs().length;
  const isAdmin=S.user.role==='admin';
  return `<span class="ss-logo" onclick="go('home')">SkillSwap</span>
  <span class="nl ${S.view==='home'?'act':''}" onclick="go('home')">Acasă</span>
  <span class="nl ${S.view==='search'?'act':''}" onclick="go('search',{searchQ:''})">Caută</span>
  <span class="nl ${S.view==='messages'?'act':''}" onclick="go('messages')">
    Mesaje${msgs?` <span style="background:#B8750F;color:white;border-radius:99px;font-size:10px;padding:1px 5px">${msgs}</span>`:''}
  </span>
  ${isAdmin?`<span class="nl ${S.view==='admin'?'act':''}" onclick="go('admin')">Admin</span>`:''}
  <div style="margin-left:auto;cursor:pointer;display:flex;align-items:center;gap:8px" onclick="go('profile')">
    ${av(S.user,30)}
    <span style="font-size:13px;color:var(--color-text-secondary)">${S.user.un}</span>
  </div>
  <button class="btn" onclick="doLogout()" style="font-size:12px">
    <i class="ti ti-logout" aria-hidden="true"></i>
  </button>`;
}

function viewHTML(){
  switch(S.view){
    case 'home': return vHome();
    case 'login': return vLogin();
    case 'register': return vRegister();
    case 'browse': return vBrowse();
    case 'profile': return vProfile();
    case 'search': return vSearch();
    case 'user-profile': return vUserProfile();
    case 'messages': return vMessages();
    case 'chat': return vChat();
    case 'schedule': return vSchedule();
    case 'admin': return vAdmin();
    default: return vHome();
  }
}

function vHome(){
  const skills=S.users.filter(u=>u.role!=='admin'&&!u.blocked).flatMap(u=>u.offered.map(s=>({...s,usr:u})));
  return `
<div class="hero">
  <p style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.65;margin-bottom:10px">Platformă de schimb de aptitudini</p>
  <h1 style="font-family:var(--font-serif);font-size:2rem;font-weight:500;line-height:1.35;margin-bottom:.75rem">Schimbă aptitudini,<br>nu bani.</h1>
  <p style="font-size:14px;opacity:.8;max-width:440px;margin:0 auto 1.5rem;line-height:1.6">SkillSwap conectează oameni care vor să învețe cu cei care pot preda — pe baza timpului investit, nu a banilor.</p>
  ${S.user?
    `<button class="btn btn-p" onclick="go('search',{searchQ:''})" style="font-size:14px;padding:9px 22px;background:white;color:#0B5540;border-color:white"><i class="ti ti-search" aria-hidden="true"></i> Caută parteneri</button>`:
    `<div style="display:flex;gap:10px;justify-content:center">
      <button class="btn" onclick="go('register')" style="background:white;color:#0B5540;border-color:white;font-size:14px;padding:9px 22px">Alătură-te gratuit</button>
      <button class="btn" onclick="go('login')" style="background:transparent;color:white;border-color:rgba(255,255,255,.45);font-size:14px;padding:9px 22px">Autentificare</button>
    </div>`}
</div>
<div class="page">
  <div style="margin:1.5rem 0">
    <h2 style="font-size:1.1rem;font-weight:500;margin-bottom:1rem">Cum funcționează?</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      ${[
        {ic:'ti-user-plus',t:'1. Creează profil',d:'Listează ce știi să faci și ce vrei să înveți.'},
        {ic:'ti-search',t:'2. Caută parteneri',d:'Găsește pe cineva cu aptitudinile de care ai nevoie.'},
        {ic:'ti-calendar-event',t:'3. Stabilește schimbul',d:'Trimite o cerere și programați o ședință.'}
      ].map(s=>`<div class="card" style="text-align:center;padding:1.25rem 1rem">
        <i class="ti ${s.ic}" style="font-size:26px;color:#0B5540;display:block;margin-bottom:10px" aria-hidden="true"></i>
        <p style="font-weight:500;font-size:13px;margin-bottom:5px">${s.t}</p>
        <p style="font-size:12px;color:var(--color-text-secondary);line-height:1.5">${s.d}</p>
      </div>`).join('')}
    </div>
  </div>
  <div>
    <div class="row-sb" style="margin-bottom:12px">
      <h2 style="font-size:1.1rem;font-weight:500">Aptitudini oferite în comunitate</h2>
      <span class="nl" onclick="go('browse')" style="font-size:12px;color:#0B5540">Vezi toate <i class="ti ti-arrow-right" aria-hidden="true"></i></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
      ${skills.slice(0,4).map(s=>`
        <div class="card row" style="cursor:pointer" onclick="viewUser(${s.usr.id})">
          ${av(s.usr,42)}
          <div style="min-width:0">
            <p style="font-weight:500;font-size:13px">${s.usr.name}</p>
            <span class="bg bg-g" style="margin:3px 0;display:inline-block">${s.cat}</span>
            <p style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.desc}</p>
          </div>
        </div>`).join('')}
    </div>
  </div>
</div>`;
}

function vLogin(){
  return `<div class="page" style="max-width:400px;padding-top:2rem">
  <div class="card">
    <h2 style="font-size:1.1rem;font-weight:500;margin-bottom:4px">Autentificare</h2>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1.1rem">Nu ai cont? <span style="color:#0B5540;cursor:pointer" onclick="go('register')">Înregistrează-te</span></p>
    ${S.alert?`<div class="alert-e">${S.alert}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:11px">
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px">Email</label>
        <input class="inp" id="l-em" type="email" placeholder="email@exemplu.ro"/>
      </div>
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px">Parolă</label>
        <input class="inp" id="l-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-p" onclick="doLogin()" style="justify-content:center;padding:9px">Autentificare</button>
    </div>
    <div style="margin-top:14px;padding:10px;background:var(--color-background-secondary);border-radius:8px;font-size:12px;color:var(--color-text-secondary);line-height:1.8">
      <strong>Demo rapid:</strong><br>
      Membru: <code>alex@example.com</code> / <code>pass123</code><br>
      Admin: <code>admin@skillswap.ro</code> / <code>admin123</code>
    </div>
  </div>
</div>`;
}

function vRegister(){
  return `<div class="page" style="max-width:420px;padding-top:2rem">
  <div class="card">
    <h2 style="font-size:1.1rem;font-weight:500;margin-bottom:4px">Creare cont nou</h2>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1.1rem">Ai deja cont? <span style="color:#0B5540;cursor:pointer" onclick="go('login')">Autentifică-te</span></p>

      </div>
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px">Email *</label>
        <input class="inp" id="r-em" type="email" placeholder="email@exemplu.ro"/>
      </div>
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px">Parolă * (minim 6 caractere)</label>
        <input class="inp" id="r-pw" type="password" placeholder="••••••••"/>
      </div>
      <div>
        <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px">Confirmă parola *</label>

        <input type="checkbox" id="r-terms" style="margin-top:2px;flex-shrink:0"/>
        <label for="r-terms" style="font-size:12px;color:var(--color-text-secondary);cursor:pointer;line-height:1.5">
          Sunt de acord cu <span style="color:#0B5540">Termenii și Condițiile</span> și <span style="color:#0B5540">Politica de Confidențialitate</span> (GDPR)
        </label>
      </div>
      <button class="btn btn-p" onclick="doRegister()" style="justify-content:center;padding:9px">Creează cont</button>
    </div>
  </div>
</div>`;

function vBrowse(){
  const skills=S.users.filter(u=>u.role!=='admin'&&!u.blocked).flatMap(u=>u.offered.map(s=>({...s,usr:u})));
  return `<div class="page">
  <div class="row-sb" style="margin-bottom:1rem">
    <h2 style="font-size:1.1rem;font-weight:500">Aptitudini disponibile (${skills.length})</h2>
    ${!S.user?`<button class="btn btn-p" onclick="go('register')">Alătură-te</button>`:''}
  </div>
  ${!S.user?`<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem">Înregistrează-te pentru a iniția schimburi.</p>`:''}
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
    ${skills.map(s=>`<div class="card" style="cursor:pointer" onclick="viewUser(${s.usr.id})">
      <div class="row" style="margin-bottom:8px">
        ${av(s.usr,34)}
        <div>
          <p style="font-weight:500;font-size:13px">${s.usr.name}</p>
          <span class="bg bg-g">${s.cat}</span>

</div>`;
}

function vProfile(){
  if(!S.user){go('login');return '';}
  const em=S.editMode;
  const pend=pendingFor(S.user.id);
  return `<div class="page">
  <div class="row" style="margin-bottom:1.25rem">
    ${av(S.user,56)}
    <div>
      <h2 style="font-size:1.2rem;font-weight:500">${S.user.name}</h2>
      <p style="font-size:12px;color:var(--color-text-secondary)">@${S.user.un} · ${S.user.email}</p>
      <div style="display:flex;gap:6px;margin-top:5px">
        <span class="bg bg-g"><i class="ti ti-check" aria-hidden="true"></i> Email confirmat</span>
        ${S.user.role==='admin'?'<span class="bg bg-b">Administrator</span>':''}
      </div>
    </div>
  </div>
  ${S.alert?`<div class="alert-s"><i class="ti ti-check" aria-hidden="true"></i> ${S.alert}</div>`:''}
  <div class="card" style="margin-bottom:12px">
    <div class="row-sb" style="margin-bottom:1rem">
      <h3 style="font-weight:500;font-size:14px">Aptitudinile mele</h3>
      ${!em?`<button class="btn" onclick="S.editMode=true;render()" style="font-size:12px"><i class="ti ti-edit" aria-hidden="true"></i> Editează</button>`:''}
    </div>
    ${em?`
      <div style="display:flex;flex-direction:column;gap:11px">
        <div>
          <label style="font-size:12px;font-weight:500;display:block;margin-bottom:4px"><i class="ti ti-hand-finger" aria-hidden="true"></i> Ce ofer — categorie</label>
          <input class="inp" id="e-ocat" placeholder="ex: Programare" value="${S.user.offered[0]?.cat||''}"/>
        </div>
        <div>
          <label style="font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px">Descriere aptitudine oferită</label>
          <textarea class="inp" id="e-odesc" placeholder="Scurtă descriere..." style="height:72px;resize:vertical">${S.user.offered[0]?.desc||''}</textarea>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;display:block;margin-bottom:4px"><i class="ti ti-search" aria-hidden="true"></i> Ce caut — categorie</label>

        <div style="display:flex;gap:8px">

        </div>
      </div>
    `:`
      <div style="margin-bottom:12px">
        <p style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Ofer</p>
        ${S.user.offered.length===0?`<p style="font-size:13px;color:var(--color-text-secondary)">Nicio aptitudine adăugată. <span style="color:#0B5540;cursor:pointer" onclick="S.editMode=true;render()">Adaugă acum →</span></p>`:
          S.user.offered.map(s=>`<div style="margin-bottom:7px"><span class="bg bg-g">${s.cat}</span><p style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">${s.desc}</p></div>`).join('')}
      </div>

function doLogin(){
  const em=document.getElementById('l-em')?.value?.trim();
  const pw=document.getElementById('l-pw')?.value;
  const found=S.users.find(u=>u.email===em&&u.pw===pw);
  if(!found){S.alert='Email sau parolă incorecte.';render();return;}
  if(found.blocked){S.alert='Contul tău a fost blocat de administrator.';render();return;}
  S.user=found;S.alert=null;go('home');
}

function doRegister(){
  const un=document.getElementById('r-un')?.value?.trim();
  const em=document.getElementById('r-em')?.value?.trim();
  const pw=document.getElementById('r-pw')?.value;
  const pw2=document.getElementById('r-pw2')?.value;
  const terms=document.getElementById('r-terms')?.checked;
  if(!un||!em||!pw){S.alert='Completează toate câmpurile obligatorii.';render();return;}
  if(pw!==pw2){S.alert='Parolele nu coincid.';render();return;}
  if(pw.length<6){S.alert='Parola trebuie să aibă minim 6 caractere.';render();return;}
  if(!terms){S.alert='Trebuie să accepți Termenii și Condițiile (GDPR).';render();return;}
  if(S.users.find(u=>u.email===em)){S.alert='Email-ul este deja înregistrat.';render();return;}
  if(S.users.find(u=>u.un===un)){S.alert='Numele de utilizator este deja folosit.';render();return;}
  const colors=['#0B5540','#B8750F','#4A3FAA','#8C2E50','#0D6650'];
  const nu={id:Date.now(),un,email:em,pw,role:'member',confirmed:true,blocked:false,name:un.replace(/_/g,' '),bio:'',offered:[],wanted:[],av:un.substring(0,2).toUpperCase(),col:colors[Math.floor(Math.random()*colors.length)]};
  S.users.push(nu);S.user=nu;S.alert=null;S.editMode=true;go('profile');
}

function doLogout(){S.user=null;S.alert=null;S.editMode=false;S.proposeForm=false;go('home');}

function saveProfile(){
  const cat=document.getElementById('e-ocat')?.value?.trim();
  const desc=document.getElementById('e-odesc')?.value?.trim();
  const wcat=document.getElementById('e-wcat')?.value?.trim();
  S.user.offered=cat?[{cat,desc}]:[];
  S.user.wanted=wcat?[{cat:wcat}]:[];
  S.editMode=false;S.alert='Profilul a fost actualizat cu succes!';render();
  setTimeout(()=>{S.alert=null;if(S.view==='profile')render();},3000);
}

function viewUser(id){
  const pu=S.users.find(u=>u.id===id);
  if(!pu)return;
  if(!S.user){go('login');return;}
  S.focusUser=pu;S.proposeForm=false;go('user-profile');
}

function sendReq(toId){
  const msg=document.getElementById('pm')?.value?.trim();
  if(!msg){alert('Adaugă un mesaj de prezentare!');return;}
  const nr={id:Date.now(),fId:S.user.id,tId:toId,msg,status:'Pending',dt:new Date().toISOString().split('T')[0]};
  S.reqs.push(nr);
  const nc={id:Date.now(),pts:[S.user.id,toId],msgs:[{f:S.user.id,t:msg,ts:ts()}],rId:nr.id};
  S.convs.push(nc);
  S.proposeForm=false;S.focusConv=nc;go('chat');
}

function respReq(id,status){
  const r=S.reqs.find(r=>r.id===id);
  if(r){r.status=status;}
  S.alert=status==='Accepted'?'Cererea a fost acceptată! Poți acum programa o ședință.':'Cererea a fost respinsă.';
  render();setTimeout(()=>{S.alert=null;if(S.view==='profile')render();},3500);
}

function sendMsg(){
  const el=document.getElementById('mi');
  const t=el?.value?.trim();
  if(!t||!S.focusConv)return;
  S.focusConv.msgs.push({f:S.user.id,t,ts:ts()});
  el.value='';render();
  document.getElementById('ss-body').scrollTop=999999;
}

function saveSess(){
  const date=document.getElementById('sd')?.value;
  const time=document.getElementById('st')?.value;
  const loc=document.getElementById('sl')?.value?.trim();
  if(!date||!time||!loc){alert('Completează toate câmpurile!');return;}
  const conv=S.focusConv;
  const existIdx=S.sessions.findIndex(s=>s.cId===conv.id);
  const pId=conv.pts.find(id=>id!==S.user.id);
  const sessData={id:existIdx>=0?S.sessions[existIdx].id:Date.now(),cId:conv.id,iId:S.user.id,gId:pId,date,time,loc,status:'În așteptare'};
  if(existIdx>=0)S.sessions[existIdx]=sessData;else S.sessions.push(sessData);
  conv.msgs.push({f:S.user.id,t:`Am ${existIdx>=0?'actualizat':'programat'} o ședință pentru ${date} la ${time}. Locație: ${loc}`,ts:ts()});
  go('chat');
}

function respSess(id,status){
  const sess=S.sessions.find(s=>s.id===id);
  if(sess){
    sess.status=status;
    const msgs={Programată:'Am acceptat invitația!',Anulată:'Am refuzat invitația.',Reprogramare:'Propun o reprogramare a ședinței.'};
    S.focusConv.msgs.push({f:S.user.id,t:msgs[status],ts:ts()});
  }
  render();
}

function toggleBlock(id){
  const pu=S.users.find(u=>u.id===id);
  if(pu)pu.blocked=!pu.blocked;render();
}

function resolveRep(id){
  const r=S.reports.find(r=>r.id===id);
  if(r)r.status='Rezolvat';render();
}

S.editMode=false;S.proposeForm=false;S.searchQ='';S.adminTab='users';
render();
</script>
